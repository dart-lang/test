# See https://pub.dev/packages/mono_repo

stages:
- analyze_and_format:
  - group:
    - format
    - command: dart run build_runner build
    - analyze: --fatal-infos
    sdk: dev
  - group:
    - analyze
    sdk: pubspec
- unit_test:
  - group:
    - command: dart run build_runner build
    - test
    sdk: [dev, pubspec]
